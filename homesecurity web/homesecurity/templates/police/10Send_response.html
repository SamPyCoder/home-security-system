{% extends 'police/8policestation_home.html' %}
{% block body %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form action="" method="post" class="border p-4 bg-light shadow">
                {% csrf_token %}
                <h4 class="text-center mb-4">Send Response</h4>
                <div class="mb-3">
                    <label for="response" class="form-label">Response</label>
                    <input type="text" name="response" id="response" class="form-control" required>
                </div>
                <div class="text-center">
                    <input type="submit" value="Send" class="btn btn-primary">
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
